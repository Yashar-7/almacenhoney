<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b1020">
    <title>Smart Tech - Acceso Seguro</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b1020;
            --card: rgba(19, 29, 47, 0.78);
            --line: #f2b705;
            --honey: #f6c453;
            --violet: #8b5cf6;
            --cyan: #7dc7d4;
            --text: #e6edf5;
            --text-soft: #b9c5d8;
            --error: #ff6b6b;
            --ok: #6dd9a2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 10%, rgba(139, 92, 246, 0.12), transparent 42%),
                        radial-gradient(circle at 80% 90%, rgba(125, 199, 212, 0.09), transparent 44%),
                        var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow: hidden;
        }
        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .card {
            position: relative;
            z-index: 1;
            width: min(94vw, 410px);
            padding: 26px 22px 20px 22px;
            border-radius: 18px;
            background: var(--card);
            border: 1px solid rgba(246, 196, 83, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 0 0 1px rgba(246, 196, 83, 0.22), 0 0 18px rgba(246, 196, 83, 0.15), 0 18px 40px rgba(0, 0, 0, 0.35);
        }
        .brand {
            margin: 0;
            text-align: center;
            font-size: 1.42rem;
            letter-spacing: 1.8px;
            font-weight: 700;
            text-transform: uppercase;
            color: #e0f4f8;
            text-shadow: 0 0 12px rgba(125, 199, 212, 0.45), 0 0 24px rgba(139, 92, 246, 0.35);
        }
        .brand small {
            display: block;
            margin-top: 2px;
            font-size: 0.64rem;
            letter-spacing: 3.6px;
            color: #aac4d8;
            text-shadow: none;
        }
        .sub {
            margin: 8px 0 16px 0;
            text-align: center;
            font-size: 0.84rem;
            color: var(--text-soft);
        }
        label {
            font-size: 0.8rem;
            color: #ced9e8;
            display: block;
            margin: 10px 0 6px 0;
        }
        .input-wrap {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--line);
            filter: drop-shadow(0 0 5px rgba(125, 199, 212, 0.45));
            opacity: 0.95;
            pointer-events: none;
        }
        input {
            width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(242, 183, 5, 0.45);
            background: rgba(9, 15, 29, 0.8);
            color: var(--text);
            padding: 12px 44px 12px 35px;
            font-size: 0.92rem;
            outline: none;
            transition: border-color .2s ease, box-shadow .2s ease;
        }
        input:focus {
            border-color: rgba(242, 183, 5, 0.75);
            box-shadow: 0 0 0 3px rgba(242, 183, 5, 0.16);
        }
        .btn-eye {
            position: absolute;
            right: 7px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: rgba(38, 53, 79, 0.75);
            color: #d0d9e6;
            border-radius: 8px;
            font-size: 0.78rem;
            padding: 5px 8px;
            cursor: pointer;
        }
        .btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 0.94rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 14px;
        }
        .btn-main {
            background: linear-gradient(90deg, #f2b705, #f57c00);
            color: #fff;
            box-shadow: 0 8px 20px rgba(245, 124, 0, 0.24);
        }
        .switch {
            text-align: center;
            margin-top: 12px;
            font-size: 0.82rem;
            color: var(--text-soft);
        }
        .switch button, .forgot-link {
            border: none;
            background: none;
            color: #b9d9e3;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.82rem;
        }
        .forgot-wrap {
            margin-top: 8px;
            text-align: center;
        }
        .forgot-link {
            opacity: 0.9;
        }
        .glass-doors {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100000;
            display: none;
            pointer-events: none;
            background: rgba(11, 16, 32, 0.55);
            opacity: 0;
        }
        .glass-doors.show {
            display: flex;
            opacity: 1;
        }
        .glass-doors.active {
            display: flex;
            opacity: 1;
        }
        .door-panel {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            transform: translateX(0);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #f2b705;
            box-shadow: inset 0 0 0 1px rgba(242, 183, 5, 0.35), 0 0 16px rgba(242, 183, 5, 0.24);
        }
        .door-left { left: 0; border-right: 2px solid #f2b705; }
        .door-right { right: 0; border-left: 2px solid #f2b705; }
        .door-panel::after {
            content: "";
            position: absolute;
            top: 0;
            left: 8%;
            width: 24%;
            height: 100%;
            background: linear-gradient(110deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.06));
            opacity: 0.42;
        }
        .glass-doors.open .door-left { transform: translateX(-105%); }
        .glass-doors.open .door-right { transform: translateX(105%); }
        .glass-doors.open .door-panel { transition: transform 1.5s ease; }
        .bienvenida-doors {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #f3f6fb;
            font-weight: 700;
            font-size: clamp(1rem, 2.8vw, 1.5rem);
            text-align: center;
            text-shadow: 0 0 12px rgba(125, 199, 212, 0.5);
            width: min(90vw, 700px);
            padding: 0 16px;
            opacity: 1;
            transition: opacity .45s ease;
        }
        .glass-doors.open .bienvenida-doors { opacity: 0; }
        .toast-wrap {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1800;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: min(86vw, 320px);
            pointer-events: none;
        }
        .toast {
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.86rem;
            font-weight: bold;
            color: #fff;
            background: rgba(20, 24, 34, 0.96);
            border: 1px solid #2d3748;
            box-shadow: 0 0 12px rgba(125, 199, 212, 0.25);
            transform: translateX(10px);
            opacity: 0;
            transition: transform .18s ease, opacity .18s ease;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-success { border-color: var(--ok); box-shadow: 0 0 12px rgba(109, 217, 162, 0.45); }
        .toast-error { border-color: var(--error); box-shadow: 0 0 12px rgba(255, 107, 107, 0.55); }
        .toast-info { border-color: var(--line); }
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1900;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(2px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 14px;
        }
        .modal-card {
            width: min(92vw, 360px);
            background: rgba(22, 31, 49, 0.92);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid rgba(135, 206, 218, 0.55);
            box-shadow: 0 0 18px rgba(125, 199, 212, 0.25), 0 10px 30px rgba(0, 0, 0, 0.35);
        }
        .modal-title {
            margin: 0 0 6px 0;
            font-size: 1rem;
            color: #dbedf2;
        }
        .modal-sub {
            margin: 0 0 10px 0;
            font-size: 0.82rem;
            color: var(--text-soft);
        }
        .modal-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }
        .btn-muted {
            background: rgba(66, 84, 114, 0.72);
            color: #edf2f8;
            margin-top: 0;
        }
        .btn-send {
            background: linear-gradient(90deg, #7049f2, #42c2db);
            color: #fff;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div id="toast-wrap" class="toast-wrap"></div>
    <div id="glass-doors" class="glass-doors">
        <div class="door-panel door-left"></div>
        <div class="door-panel door-right"></div>
        <div id="bienvenida-doors" class="bienvenida-doors">¡Bienvenidos a Tu Almacén!</div>
    </div>

    <div class="card">
        <h1 class="brand">Smart Tech<small>Secure Access</small></h1>
        <p id="subtitulo" class="sub">Inicia sesión para entrar al dashboard.</p>

        <label for="email">Email</label>
        <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="1.8" />
                <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <input id="email" type="email" placeholder="tucorreo@ejemplo.com">
        </div>

        <label for="password">Contraseña</label>
        <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8"></rect>
                <path d="M8 11V8a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="1.8"></path>
            </svg>
            <input id="password" type="password" placeholder="Tu contraseña">
            <button class="btn-eye" type="button" onclick="togglePassword()">👁</button>
        </div>

        <button id="btn-main" class="btn btn-main" onclick="procesarAuth()">Ingresar</button>

        <div class="switch">
            <span id="switch-label">¿No tienes cuenta?</span>
            <button type="button" onclick="toggleModoRegistro()" id="switch-btn">Regístrate</button>
        </div>
        <div class="forgot-wrap">
            <button class="forgot-link" type="button" onclick="abrirModalRecupero()">¿Olvidaste tu contraseña?</button>
        </div>
    </div>

    <div id="modal-recupero" class="modal-overlay">
        <div class="modal-card">
            <h3 class="modal-title">Recuperar contraseña</h3>
            <p class="modal-sub">Ingresa tu email y te enviaremos el enlace para restablecer acceso.</p>
            <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="1.8" />
                    <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.8" />
                </svg>
                <input id="email-reset" type="email" placeholder="tuemail@ejemplo.com">
            </div>
            <div class="modal-actions">
                <button class="btn btn-muted" type="button" onclick="cerrarModalRecupero()">Cancelar</button>
                <button class="btn btn-send" type="button" onclick="enviarRecuperacion()">Enviar enlace</button>
            </div>
        </div>
    </div>

<script>
    const SB_URL = "https://svpurpvbiujhcbiugrkh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2cHVycHZiaXVqaGNiaXVncmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3NDgzMTUsImV4cCI6MjA4MzMyNDMxNX0.AivKJ0_N0z_4T4vLNfUcE2hepJ1XXOO8-4fSA3PJXdc";
    const NEGOCIO_NOMBRE_KEY = "honey_nombre_comercio";
    const FORCE_ADMIN_EMAIL = "romarsalazar777@gmail.com";
    const _supabase = window.supabase.createClient(SB_URL, SB_KEY);
    let modoRegistro = false;
    let toastTimeoutRef = null;
    let authRedirectHandled = false;

    function showToast(message, type = "info", duration = 2200) {
        const wrap = document.getElementById('toast-wrap');
        if (!wrap) return;
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        wrap.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        clearTimeout(toastTimeoutRef);
        toastTimeoutRef = setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 220);
        }, duration);
    }

    function togglePassword() {
        const input = document.getElementById('password');
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    function toggleModoRegistro() {
        modoRegistro = !modoRegistro;
        document.getElementById('btn-main').innerText = modoRegistro ? 'Crear Cuenta' : 'Ingresar';
        document.getElementById('subtitulo').innerText = modoRegistro
            ? 'Regístrate para crear tu espacio de trabajo.'
            : 'Inicia sesión para entrar al dashboard.';
        document.getElementById('switch-label').innerText = modoRegistro ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?';
        document.getElementById('switch-btn').innerText = modoRegistro ? 'Inicia sesión' : 'Regístrate';
    }

    async function obtenerNombreComercioPorUsuario(userId) {
        try {
            const { data, error } = await _supabase
                .from('configuracion_negocio')
                .select('nombre_comercio')
                .eq('user_id', userId)
                .maybeSingle();
            if (error) throw error;
            return (data?.nombre_comercio || "").trim();
        } catch (err) {
            return "";
        }
    }

    function obtenerRolUsuario(user) {
        const email = String(user?.email || "").toLowerCase();
        if (email === FORCE_ADMIN_EMAIL) return "ADMIN";
        return String(user?.user_metadata?.role || user?.app_metadata?.role || 'EMPLEADO').toUpperCase();
    }

    async function ejecutarTransicion(nombreComercio) {
        const doors = document.getElementById('glass-doors');
        const msg = document.getElementById('bienvenida-doors');
        if (!doors || !msg) return;
        msg.textContent = nombreComercio ? `¡Bienvenidos a ${nombreComercio}!` : '¡Bienvenidos a Tu Almacén!';
        doors.classList.remove('open');
        doors.style.display = 'flex';
        doors.style.opacity = '1';
        doors.classList.add('active', 'show');
        console.log('Puertas Iniciadas');
        await new Promise((r) => setTimeout(r, 150));
        doors.classList.add('open');
        await new Promise((resolve) => setTimeout(resolve, 1800));
        doors.classList.remove('active', 'show', 'open');
        doors.style.display = 'none';
        doors.style.opacity = '0';
        console.log('Redireccionando');
    }

    function abrirModalRecupero() {
        const modal = document.getElementById('modal-recupero');
        const emailActual = document.getElementById('email').value.trim();
        document.getElementById('email-reset').value = emailActual;
        modal.style.display = 'flex';
        document.getElementById('email-reset').focus();
    }

    function cerrarModalRecupero() {
        document.getElementById('modal-recupero').style.display = 'none';
    }

    async function enviarRecuperacion() {
        const email = document.getElementById('email-reset').value.trim();
        if (!email) {
            showToast('Ingresa un email válido.', 'error');
            return;
        }
        try {
            const redirectTo = `${window.location.origin}${window.location.pathname.replace('login.html', 'reset-password.html')}`;
            const { error } = await _supabase.auth.resetPasswordForEmail(email, { redirectTo });
            if (error) throw error;
            showToast('Te enviamos el email de recuperación.', 'success', 3000);
            cerrarModalRecupero();
        } catch (err) {
            showToast(err.message || 'No se pudo enviar el email de recuperación.', 'error', 3400);
        }
    }

    async function procesarAuth() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) {
            showToast('Completa email y contraseña.', 'error');
            return;
        }
        try {
            if (modoRegistro) {
                const { error } = await _supabase.auth.signUp({ email, password });
                if (error) throw error;
                showToast('Cuenta creada. Revisa tu correo para confirmarla.', 'success', 3000);
                modoRegistro = true;
                toggleModoRegistro();
                return;
            }
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            const nombreComercio = await obtenerNombreComercioPorUsuario(data?.user?.id);
            const bienvenida = nombreComercio ? `¡Bienvenidos a ${nombreComercio}!` : '¡Bienvenidos a Tu Almacén!';
            const rol = obtenerRolUsuario(data?.user);
            localStorage.setItem(NEGOCIO_NOMBRE_KEY, nombreComercio || "Tu Almacén");
            localStorage.setItem("honey_user_role", rol);
            document.getElementById('subtitulo').innerText = bienvenida;
            authRedirectHandled = true;
            await ejecutarTransicion(nombreComercio);
            showToast('Acceso correcto. Redirigiendo...', 'success', 1300);
            window.location.href = 'index.html';
        } catch (err) {
            showToast(err.message || 'Error de autenticación.', 'error', 3200);
        }
    }

    function initParticles() {
        const canvas = document.getElementById('particles');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        let w = 0;
        let h = 0;
        let particles = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            const count = Math.max(22, Math.floor((w * h) / 24000));
            particles = Array.from({ length: count }).map(() => ({
                x: Math.random() * w,
                y: Math.random() * h,
                r: 1 + Math.random() * 2.3,
                vx: -0.18 + Math.random() * 0.36,
                vy: -0.18 + Math.random() * 0.36,
                c: Math.random() > 0.5 ? '125,199,212' : '139,92,246'
            }));
        }

        function tick() {
            ctx.clearRect(0, 0, w, h);
            for (const p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < -8) p.x = w + 8;
                if (p.x > w + 8) p.x = -8;
                if (p.y < -8) p.y = h + 8;
                if (p.y > h + 8) p.y = -8;

                const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4.8);
                glow.addColorStop(0, `rgba(${p.c},0.34)`);
                glow.addColorStop(1, `rgba(${p.c},0)`);
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * 4.8, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(tick);
        }

        resize();
        tick();
        window.addEventListener('resize', resize);
    }

    document.addEventListener('DOMContentLoaded', async () => {
        initParticles();
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) window.location.href = 'index.html';
    });

    _supabase.auth.onAuthStateChange((event, session) => {
        if (authRedirectHandled) return;
        if (event === 'SIGNED_IN' && session?.user) {
            window.location.href = 'index.html';
        }
    });
</script>
</body>
</html>
