<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f39c12">
    <title>Panel Honey - Gestión PRO Segura</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --naranja: #f39c12; --amarillo: #f1c40f; --negro: #1a1a1a; --rojo: #e74c3c; --verde: #2ecc71; --azul: #2980b9; --morado: #8e44ad; }
        body { font-family: sans-serif; background: var(--negro); color: white; padding: 10px; text-align: center; margin:0; }
        .card { background: #2c3e50; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; border: 1px solid #444; }
        
        .admin-only { display: none; } 
        
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 1rem; background: white; color: black; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-scan { background: var(--amarillo); color: black; }
        .btn-save { background: var(--verde); color: white; }
        .btn-delete { background: var(--rojo); color: white; margin-top: 10px; }
        .btn-gasto { background: var(--rojo); color: white; }
        .btn-caja { background: var(--naranja); color: white; }
        .btn-excel { background: #1d6f42; color: white; }
        .btn-lista { background: var(--azul); color: white; }
        .btn-nav { background: #555; color: white; margin-bottom: 10px; }
        
        h2, h3 { color: var(--amarillo); margin: 5px 0; }
        #resultado-caja { font-size: 0.9rem; margin-top: 10px; background: #000; padding: 12px; border-radius: 10px; }
        .ganancia-total { color: var(--verde); font-size: 1.6rem; font-weight: bold; display: block; text-align: center; margin-top: 5px; }
        .grid-metodos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
        
        .tabla-contenedor { overflow-x: auto; margin-top: 10px; background: #1a1a1a; border-radius: 10px; }
        .tabla-inventario { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .tabla-inventario th { background: #444; color: var(--amarillo); padding: 10px; text-align: left; }
        .tabla-inventario td { padding: 10px; border-bottom: 1px solid #333; }
        .stock-ok { color: #39ff88; font-weight: bold; text-shadow: 0 0 8px rgba(57, 255, 136, 0.85); }
        .stock-low { color: #ffb347; font-weight: bold; text-shadow: 0 0 8px rgba(255, 179, 71, 0.85); }
        .stock-zero { color: #ff3b3b; font-weight: bold; text-shadow: 0 0 10px rgba(255, 59, 59, 0.95); animation: stockPulse 1.1s infinite; }
        @keyframes stockPulse {
            0% { opacity: 1; }
            50% { opacity: 0.45; }
            100% { opacity: 1; }
        }
        .stock-cell {
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
        .stock-value {
            min-width: 20px;
            display: inline-block;
            text-align: center;
            font-weight: bold;
        }
        .btn-stock {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: 0.95rem;
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
            color: white;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }
        .btn-stock-plus {
            background: rgba(46, 204, 113, 0.18);
            border-color: rgba(46, 204, 113, 0.95);
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.7);
        }
        .btn-stock-minus {
            background: rgba(231, 76, 60, 0.2);
            border-color: rgba(231, 76, 60, 0.95);
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.68);
        }
        .btn-stock[disabled] {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
        }
        .toast-wrap {
            position: fixed;
            top: 76px;
            right: 16px;
            z-index: 1800;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: min(86vw, 320px);
            pointer-events: none;
        }
        .toast {
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.86rem;
            font-weight: bold;
            color: #fff;
            background: rgba(20, 24, 34, 0.96);
            border: 1px solid #2d3748;
            box-shadow: 0 0 12px rgba(241, 196, 15, 0.28);
            transform: translateX(10px);
            opacity: 0;
            transition: transform .18s ease, opacity .18s ease;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-success { border-color: #39ff88; box-shadow: 0 0 12px rgba(57, 255, 136, 0.55); }
        .toast-error { border-color: #ff3b3b; box-shadow: 0 0 12px rgba(255, 59, 59, 0.62); }
        .toast-info { border-color: #f1c40f; box-shadow: 0 0 12px rgba(241, 196, 15, 0.48); }
        .capital-card { background: var(--azul); padding: 10px; border-radius: 10px; margin-bottom: 10px; text-align: center; }
        .badge-role { background: var(--amarillo); color: black; padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>
    <div id="toast-wrap" class="toast-wrap"></div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <button class="btn btn-nav" style="width: auto;" onclick="window.location.href='index.html'">🏠 VOLVER</button>
        <span id="roleBadge" class="badge-role">ROL: Cargando...</span>
    </div>

    <h2>🍯 Gestión Almacén Honey</h2>
    
    <div id="reader" style="width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid var(--amarillo); margin-bottom:10px;"></div>
    <button class="btn btn-scan" onclick="iniciarEscaneo()">📷 ESCANEAR PRODUCTO</button>

    <div class="card admin-only">
        <h3>📦 Editor de Productos</h3>
        <label style="font-size: 0.8rem; color: var(--amarillo);">Código de Barras (Manual o Scan):</label>
        <input type="text" id="cod" placeholder="Escribe o escanea código" onchange="verificarExistencia(this.value)">
        
        <label style="font-size: 0.8rem; color: var(--amarillo);">Nombre del Producto:</label>
        <input type="text" id="nom" placeholder="Nombre del producto">
        
        <label style="font-size: 0.8rem; color: var(--amarillo);">Costo (Lo que pagaste):</label>
        <input type="number" id="cos" placeholder="Costo $" step="0.01">
        
        <label style="font-size: 0.8rem; color: var(--amarillo);">Venta (Al público):</label>
        <input type="number" id="pre" placeholder="Venta $" step="0.01">
        
        <label style="font-size: 0.8rem; color: var(--amarillo);">Stock Actual:</label>
        <input type="number" id="sto" placeholder="Cantidad en stock">
        
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-save" onclick="guardarProducto()">💾 GUARDAR / EDITAR</button>
            <button class="btn btn-nav" onclick="limpiarFormulario()">🧹 LIMPIAR</button>
        </div>
        <button class="btn btn-delete" id="btn-eliminar" style="display:none;" onclick="eliminarProducto()">🗑️ ELIMINAR PRODUCTO</button>
    </div>

    <div class="card">
        <h3>📋 Lista de Mercadería</h3>
        <div class="capital-card admin-only">
            💰 Valor Venta Total: <b id="total-stock-pesos">$0</b>
        </div>
        <button class="btn btn-lista" onclick="cargarListaMercaderia()">🔄 ACTUALIZAR LISTA</button>
        <div class="tabla-contenedor">
            <table class="tabla-inventario">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th class="admin-only">Costo</th>
                        <th>Venta</th>
                        <th>Stock</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3>💰 Caja y Rentabilidad</h3>
        <div class="admin-only">
            <div style="display: flex; gap: 5px; margin-bottom:15px;">
                <input type="text" id="gasto-desc" placeholder="Gasto en...">
                <input type="number" id="gasto-monto" placeholder="$" style="width:100px;">
            </div>
            <button class="btn btn-gasto" onclick="guardarGasto()">🧾 ANOTAR GASTO</button>
            <hr style="border:0; border-top:1px solid #444; margin: 15px 0;">
        </div>
        
        <button class="btn btn-caja" onclick="verBalanceHoy()">📊 CALCULAR BALANCE HOY</button>
        <button class="btn btn-excel admin-only" onclick="exportarVentasExcel()">📊 EXPORTAR VENTAS A EXCEL</button>
        
        <div id="resultado-caja">
            <div style="display: flex; justify-content: space-between;">
                <span>Ventas: <b id="v-hoy">$0</b></span>
                <span class="admin-only">Gastos: <b id="g-hoy" style="color:var(--rojo);">$0</b></span>
            </div>
            <div class="grid-metodos">
                <span style="color:var(--verde)">Efe: <b id="v-efe">$0</b></span>
                <span style="color:var(--azul)">Tar: <b id="v-tar">$0</b></span>
                <span style="color:var(--morado)">QR: <b id="v-qr">$0</b></span>
                <span style="color:var(--naranja)">Trans: <b id="v-tra">$0</b></span>
            </div>
            <div class="admin-only" style="text-align:center; margin-top:10px; border-top: 1px solid #333; padding-top:5px;">
                <small>GANANCIA REAL (Venta - Costo - Gastos):</small>
                <span id="ganancia-hoy" class="ganancia-total">$ 0.00</span>
            </div>
        </div>
    </div>

    <div class="card admin-only">
        <h3>📅 Historial Semanal (Neto)</h3>
        <div id="lista-historial"></div>
    </div>

<script>
    const SB_URL = "https://svpurpvbiujhcbiugrkh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2cHVycHZiaXVqaGNiaXVncmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3NDgzMTUsImV4cCI6MjA4MzMyNDMxNX0.AivKJ0_N0z_4T4vLNfUcE2hepJ1XXOO8-4fSA3PJXdc";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    const scanner = new Html5Qrcode("reader");

    /** Rol actual en memoria (se establece tras verificar contra Supabase). No confiar solo en almacenamiento. */
    let currentUserRole = null;
    let toastTimeoutRef = null;

    function showToast(message, type = "info", duration = 2200) {
        const wrap = document.getElementById('toast-wrap');
        if (!wrap) return;
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        wrap.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        clearTimeout(toastTimeoutRef);
        toastTimeoutRef = setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 220);
        }, duration);
    }

    function claseSemaforoStock(stock) {
        if (stock === 0) return 'stock-zero';
        if (stock <= 5) return 'stock-low';
        return 'stock-ok';
    }

    /** Verifica el PIN en la tabla 'usuarios' de Supabase. Retorna el rol ('ADMIN'/'VENDEDOR') o null. */
    async function verificarPinEnSupabase(pin) {
        if (!pin || !pin.trim()) return null;
        const { data, error } = await _supabase
            .from('usuarios')
            .select('rol')
            .eq('pin', pin.trim())
            .maybeSingle();
        if (error || !data) return null;
        return (data.rol === 'ADMIN' || data.rol === 'VENDEDOR') ? data.rol : null;
    }

    /** Re-verifica el rol antes de una acción sensible. Retorna 'ADMIN', 'VENDEDOR' o null. */
    async function verificarRolActual() {
        const pin = sessionStorage.getItem('honey_pin');
        if (!pin) return null;
        return await verificarPinEnSupabase(pin);
    }

    /** Comprueba la sesión al cargar la página: PIN en sessionStorage y validación en Supabase. */
    async function verificarSesion() {
        const pin = sessionStorage.getItem('honey_pin');
        if (!pin) {
            sessionStorage.removeItem('honey_role');
            window.location.href = 'index.html';
            return;
        }
        const rol = await verificarPinEnSupabase(pin);
        if (!rol) {
            sessionStorage.removeItem('honey_pin');
            sessionStorage.removeItem('honey_role');
            window.location.href = 'index.html';
            return;
        }
        currentUserRole = rol;
        sessionStorage.setItem('honey_role', rol);
        aplicarSeguridad();
        cargarListaMercaderia();
    }

    window.onload = () => { verificarSesion(); };

    function aplicarSeguridad() {
        document.getElementById('roleBadge').innerText = "ROL: " + (currentUserRole || '—');
        if (currentUserRole === "ADMIN") {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
        }
    }

    function iniciarEscaneo() {
        scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (codigo) => {
            document.getElementById('cod').value = codigo;
            verificarExistencia(codigo);
            scanner.stop();
        }).catch(err => showToast("Error de cámara: " + err, "error", 3000));
    }

    async function verificarExistencia(codigo) {
        if(!codigo) return;
        const { data, error } = await _supabase.from('productos_almacen').select('*').eq('codigo_barras', codigo).maybeSingle();
        if (data) {
            cargarEnFormulario(data);
        } else {
            document.getElementById('nom').value = "";
            document.getElementById('cos').value = "";
            document.getElementById('pre').value = "";
            document.getElementById('sto').value = "";
            document.getElementById('btn-eliminar').style.display = "none";
        }
    }

    function cargarEnFormulario(p) {
        if(currentUserRole !== "ADMIN") return;
        document.getElementById('cod').value = p.codigo_barras;
        document.getElementById('nom').value = p.nombre;
        document.getElementById('cos').value = p.precio_costo || 0;
        document.getElementById('pre').value = p.precio;
        document.getElementById('sto').value = p.stock;
        document.getElementById('btn-eliminar').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function limpiarFormulario() {
        document.getElementById('cod').value = "";
        document.getElementById('nom').value = "";
        document.getElementById('cos').value = "";
        document.getElementById('pre').value = "";
        document.getElementById('sto').value = "";
        document.getElementById('btn-eliminar').style.display = "none";
    }

    async function eliminarProducto() {
        const rol = await verificarRolActual();
        if (!rol) {
            showToast('Sesión expirada o no válida.', 'error', 2600);
            sessionStorage.removeItem('honey_pin');
            sessionStorage.removeItem('honey_role');
            window.location.href = 'index.html';
            return;
        }
        if (rol !== 'ADMIN') {
            showToast('No autorizado. Solo ADMIN puede eliminar productos.', 'error', 2600);
            return;
        }
        const codigo = document.getElementById('cod').value;
        const nombre = document.getElementById('nom').value;
        if(!codigo) return;

        if(confirm(`¿Estás seguro de eliminar "${nombre}"? Esta acción no se puede deshacer.`)) {
            const { error } = await _supabase.from('productos_almacen').delete().eq('codigo_barras', codigo);
            if(error) {
                showToast("Error al eliminar", "error");
            } else {
                showToast("Producto eliminado", "success");
                limpiarFormulario();
                cargarListaMercaderia();
            }
        }
    }

    async function guardarProducto() {
        const rol = await verificarRolActual();
        if (!rol) {
            showToast('Sesión expirada o no válida.', 'error', 2600);
            sessionStorage.removeItem('honey_pin');
            sessionStorage.removeItem('honey_role');
            window.location.href = 'index.html';
            return;
        }
        if (rol !== 'ADMIN') {
            showToast('No autorizado. Solo ADMIN puede guardar o editar productos.', 'error', 2600);
            return;
        }
        const cod = document.getElementById('cod').value;
        const nom = document.getElementById('nom').value;
        const pre = document.getElementById('pre').value;
        
        if(!nom || !pre) return showToast("Falta Nombre o Precio", "error");
        
        // OBJETO DE DATOS
        const datos = {
            codigo_barras: cod || "M-" + nom.substring(0,3).toUpperCase() + Math.floor(Math.random()*100),
            nombre: nom, 
            precio_costo: parseFloat(document.getElementById('cos').value) || 0,
            precio: parseFloat(pre), 
            stock: parseInt(document.getElementById('sto').value) || 0 
        };

        // UPSERT CON RESOLUCIÓN DE CONFLICTO (EVITA ERROR DE LLAVE DUPLICADA)
        const { error } = await _supabase
            .from('productos_almacen')
            .upsert(datos, { onConflict: 'codigo_barras' });

        if(error) {
            showToast("Error al guardar: " + error.message, "error", 3000);
        } else {
            showToast("Guardado correctamente", "success");
            limpiarFormulario();
            cargarListaMercaderia();
        }
    }

    async function guardarGasto() {
        const rol = await verificarRolActual();
        if (!rol) {
            showToast('Sesión expirada o no válida.', 'error', 2600);
            sessionStorage.removeItem('honey_pin');
            sessionStorage.removeItem('honey_role');
            window.location.href = 'index.html';
            return;
        }
        if (rol !== 'ADMIN') {
            showToast('No autorizado. Solo ADMIN puede registrar gastos.', 'error', 2600);
            return;
        }
        const desc = document.getElementById('gasto-desc').value?.trim();
        const monto = parseFloat(document.getElementById('gasto-monto').value);
        if (!desc || isNaN(monto) || monto <= 0) {
            showToast('Indica descripción y monto válido.', 'error');
            return;
        }
        const { error } = await _supabase.from('gastos_honey').insert([{ descripcion: desc, monto: monto, fecha: new Date().toISOString() }]);
        if (error) {
            showToast('Error al guardar gasto: ' + error.message, 'error', 3000);
        } else {
            showToast('Gasto registrado', 'success');
            document.getElementById('gasto-desc').value = '';
            document.getElementById('gasto-monto').value = '';
            verBalanceHoy();
        }
    }

    async function cargarListaMercaderia() {
        const cuerpo = document.getElementById('cuerpo-tabla');
        cuerpo.innerHTML = "Cargando...";
        const { data, error } = await _supabase.from('productos_almacen').select('*').order('nombre', { ascending: true });
        if (error) return;
        
        let html = ""; let sumaTotal = 0;
        data.forEach(p => {
            const claseStock = claseSemaforoStock(Number(p.stock) || 0);
            sumaTotal += (p.precio * p.stock);
            const celdaCosto = currentUserRole === "ADMIN" ? `<td>$${p.precio_costo || 0}</td>` : "";
            const accionClick = currentUserRole === "ADMIN" ? `onclick='cargarEnFormulario(${JSON.stringify(p)})'` : "";

            html += `<tr ${accionClick} style="cursor:pointer">
                <td>${p.nombre}</td>
                ${celdaCosto}
                <td>$${p.precio}</td>
                <td class="${claseStock}">
                    <div class="stock-cell">
                        <button class="btn-stock btn-stock-minus" data-codigo="${p.codigo_barras}" onclick="ajustarStockRapido(event, this, -1)" ${p.stock <= 0 ? "disabled" : ""}>-</button>
                        <span class="stock-value">${p.stock}</span>
                        <button class="btn-stock btn-stock-plus" data-codigo="${p.codigo_barras}" onclick="ajustarStockRapido(event, this, 1)">+</button>
                    </div>
                </td>
            </tr>`;
        });
        cuerpo.innerHTML = html;
        if(currentUserRole === "ADMIN") document.getElementById('total-stock-pesos').innerText = "$ " + sumaTotal.toLocaleString();
    }

    async function ajustarStockRapido(event, btn, delta) {
        if (event) event.stopPropagation();
        const codigo = btn?.dataset?.codigo;
        const contenedor = btn?.closest('.stock-cell');
        const stockEl = contenedor?.querySelector('.stock-value');
        if (!stockEl) return;

        const stockActual = parseInt(stockEl.innerText, 10) || 0;
        const nuevoStock = stockActual + delta;
        if (nuevoStock < 0) return;

        // Optimistic UI: primero se siente instantáneo.
        stockEl.innerText = String(nuevoStock);
        const fila = stockEl.closest('td');
        if (fila) {
            fila.classList.remove('stock-ok', 'stock-low', 'stock-zero');
            fila.classList.add(claseSemaforoStock(nuevoStock));
            const btnMenos = fila.querySelector('.btn-stock-minus');
            if (btnMenos) btnMenos.disabled = nuevoStock <= 0;
        }

        const { error } = await _supabase
            .from('productos_almacen')
            .update({ stock: nuevoStock })
            .eq('codigo_barras', codigo);

        if (error) {
            stockEl.innerText = String(stockActual);
            if (fila) {
                fila.classList.remove('stock-ok', 'stock-low', 'stock-zero');
                fila.classList.add(claseSemaforoStock(stockActual));
                const btnMenos = fila.querySelector('.btn-stock-minus');
                if (btnMenos) btnMenos.disabled = stockActual <= 0;
            }
            showToast("No se pudo actualizar stock: " + error.message, "error", 3000);
            return;
        }
        showToast(delta > 0 ? "+1 en Stock" : "-1 en Stock", "success", 1200);
    }

    async function verBalanceHoy() {
        let hoy = new Date(); hoy.setHours(0,0,0,0);
        const { data: v } = await _supabase.from('ventas_honey').select('*').gte('fecha', hoy.toISOString());
        
        let efe = v.filter(x => x.metodo_pago === 'Efectivo').reduce((s, i) => s + i.total, 0);
        let tar = v.filter(x => x.metodo_pago === 'Tarjeta').reduce((s, i) => s + i.total, 0);
        let qrr = v.filter(x => x.metodo_pago === 'QR').reduce((s, i) => s + i.total, 0);
        let tra = v.filter(x => x.metodo_pago === 'Transferencia').reduce((s, i) => s + i.total, 0);
        let totV = efe + tar + qrr + tra;

        document.getElementById('v-hoy').innerText = "$ " + totV.toFixed(2);
        document.getElementById('v-efe').innerText = "$" + efe.toFixed(0);
        document.getElementById('v-tar').innerText = "$" + tar.toFixed(0);
        document.getElementById('v-qr').innerText = "$" + qrr.toFixed(0);
        document.getElementById('v-tra').innerText = "$" + tra.toFixed(0);

        const rolAdmin = await verificarRolActual();
        if (rolAdmin === "ADMIN") {
            const { data: g } = await _supabase.from('gastos_honey').select('monto').gte('fecha', hoy.toISOString());
            const { data: productos } = await _supabase.from('productos_almacen').select('nombre, precio_costo');
            let totG = g.reduce((s, i) => s + (i.monto || 0), 0);
            let costoTotalVendido = 0;
            v.forEach(venta => {
                if(venta.productos) {
                    venta.productos.split(", ").forEach(nomProd => {
                        const infoProd = productos.find(p => p.nombre === nomProd);
                        if (infoProd) costoTotalVendido += (infoProd.precio_costo || 0);
                    });
                }
            });
            const gananciaReal = totV - costoTotalVendido - totG;
            document.getElementById('g-hoy').innerText = "$ " + totG.toFixed(2);
            document.getElementById('ganancia-hoy').innerText = "$ " + gananciaReal.toFixed(2);
            verHistorial();
        }
    }

    async function exportarVentasExcel() {
        const rol = await verificarRolActual();
        if (!rol) {
            showToast('Sesión expirada o no válida.', 'error', 2600);
            sessionStorage.removeItem('honey_pin');
            sessionStorage.removeItem('honey_role');
            window.location.href = 'index.html';
            return;
        }
        if (rol !== "ADMIN") {
            showToast('No autorizado. Solo ADMIN puede exportar ventas.', 'error', 2600);
            return;
        }
        const { data: ventas } = await _supabase.from('ventas_honey').select('*').order('fecha', { ascending: false });
        const hoja = XLSX.utils.json_to_sheet(ventas.map(v => ({ Fecha: new Date(v.fecha).toLocaleString(), Productos: v.productos, Total: v.total, Metodo: v.metodo_pago })));
        const libro = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(libro, hoja, "Ventas");
        XLSX.writeFile(libro, `Honey_Ventas.xlsx`);
    }

    async function verHistorial() {
        const rol = await verificarRolActual();
        if (rol !== "ADMIN") return;
        const lista = document.getElementById('lista-historial');
        lista.innerHTML = "Cargando...";
        let hoy = new Date(); let html = "";
        for (let i = 0; i < 7; i++) {
            let d = new Date(); d.setDate(hoy.getDate() - i); d.setHours(0,0,0,0);
            let f = new Date(d); f.setHours(23,59,59,999);
            const { data: v } = await _supabase.from('ventas_honey').select('total').gte('fecha', d.toISOString()).lte('fecha', f.toISOString());
            const { data: g } = await _supabase.from('gastos_honey').select('monto').gte('fecha', d.toISOString()).lte('fecha', f.toISOString());
            let neto = (v ? v.reduce((s, x) => s + x.total, 0) : 0) - (g ? g.reduce((s, x) => s + x.monto, 0) : 0);
            html += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #333;">
                <span>${d.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric' })}</span>
                <b style="color:${neto>=0?'var(--verde)':'var(--rojo)'}">$${neto.toFixed(0)}</b>
            </div>`;
        }
        lista.innerHTML = html;
    }
</script>
