<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b1020">
    <title>Smart Tech - Restablecer Contraseña</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #090f1d;
            --card: rgba(19, 29, 47, 0.82);
            --line: #87ceda;
            --text: #e6edf5;
            --text-soft: #b9c5d8;
            --error: #ff6b6b;
            --ok: #6dd9a2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 10%, rgba(139, 92, 246, 0.12), transparent 42%),
                        radial-gradient(circle at 80% 90%, rgba(125, 199, 212, 0.09), transparent 44%),
                        var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            width: min(94vw, 390px);
            padding: 24px 20px;
            border-radius: 16px;
            background: var(--card);
            border: 1px solid rgba(135, 206, 218, 0.62);
            backdrop-filter: blur(9px);
            -webkit-backdrop-filter: blur(9px);
            box-shadow: 0 0 24px rgba(125, 199, 212, 0.2), 0 14px 32px rgba(0, 0, 0, 0.35);
        }
        h1 {
            margin: 0;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #e0f4f8;
        }
        .sub {
            margin: 8px 0 14px 0;
            text-align: center;
            color: var(--text-soft);
            font-size: 0.84rem;
        }
        label {
            display: block;
            margin: 10px 0 6px 0;
            color: #cfdae8;
            font-size: 0.82rem;
        }
        input {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #3a4a63;
            background: rgba(9, 15, 29, 0.8);
            color: var(--text);
            padding: 12px;
            font-size: 0.92rem;
            outline: none;
        }
        .btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 0.94rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 14px;
            background: linear-gradient(90deg, #7049f2, #42c2db);
            color: #fff;
        }
        .link-back {
            display: block;
            margin-top: 12px;
            text-align: center;
            color: #bfdbe4;
            font-size: 0.82rem;
        }
        .toast-wrap {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1800;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: min(86vw, 320px);
            pointer-events: none;
        }
        .toast {
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.86rem;
            font-weight: bold;
            color: #fff;
            background: rgba(20, 24, 34, 0.96);
            border: 1px solid #2d3748;
            box-shadow: 0 0 12px rgba(125, 199, 212, 0.25);
            transform: translateX(10px);
            opacity: 0;
            transition: transform .18s ease, opacity .18s ease;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-success { border-color: var(--ok); box-shadow: 0 0 12px rgba(109, 217, 162, 0.45); }
        .toast-error { border-color: var(--error); box-shadow: 0 0 12px rgba(255, 107, 107, 0.55); }
    </style>
</head>
<body>
    <div id="toast-wrap" class="toast-wrap"></div>
    <div class="card">
        <h1>Nueva contraseña</h1>
        <p class="sub">Ingresa la nueva clave para completar el restablecimiento.</p>
        <label for="password1">Nueva contraseña</label>
        <input id="password1" type="password" placeholder="Mínimo 6 caracteres">
        <label for="password2">Confirmar contraseña</label>
        <input id="password2" type="password" placeholder="Repite la contraseña">
        <button class="btn" onclick="actualizarContrasena()">Guardar nueva contraseña</button>
        <a class="link-back" href="login.html">Volver a iniciar sesión</a>
    </div>

<script>
    const SB_URL = "https://svpurpvbiujhcbiugrkh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2cHVycHZiaXVqaGNiaXVncmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3NDgzMTUsImV4cCI6MjA4MzMyNDMxNX0.AivKJ0_N0z_4T4vLNfUcE2hepJ1XXOO8-4fSA3PJXdc";
    const _supabase = window.supabase.createClient(SB_URL, SB_KEY);
    let toastTimeoutRef = null;

    function showToast(message, type = "info", duration = 2200) {
        const wrap = document.getElementById('toast-wrap');
        if (!wrap) return;
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        wrap.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        clearTimeout(toastTimeoutRef);
        toastTimeoutRef = setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 220);
        }, duration);
    }

    async function actualizarContrasena() {
        const p1 = document.getElementById('password1').value;
        const p2 = document.getElementById('password2').value;
        if (!p1 || !p2) {
            showToast('Completa ambos campos.', 'error');
            return;
        }
        if (p1.length < 6) {
            showToast('La contraseña debe tener al menos 6 caracteres.', 'error');
            return;
        }
        if (p1 !== p2) {
            showToast('Las contraseñas no coinciden.', 'error');
            return;
        }
        try {
            const { error } = await _supabase.auth.updateUser({ password: p1 });
            if (error) throw error;
            showToast('Contraseña actualizada. Redirigiendo...', 'success', 2200);
            setTimeout(() => { window.location.href = 'login.html'; }, 1200);
        } catch (err) {
            showToast(err.message || 'No se pudo actualizar la contraseña.', 'error', 3400);
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        // Si la URL trae tokens de recuperación, Supabase restablece sesión temporal automáticamente.
        const hash = window.location.hash || "";
        if (hash.includes("type=recovery")) {
            const params = new URLSearchParams(hash.substring(1));
            const accessToken = params.get("access_token");
            const refreshToken = params.get("refresh_token");
            if (accessToken && refreshToken) {
                await _supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
            }
        }
    });
</script>
</body>
</html>
